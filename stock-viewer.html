            bottom: 0;

        .expand-cell {

        }
        .toast {

            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            z-index: 1000;

    function loadColumnWidths() {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try { columnWidths = JSON.parse(saved); } catch(e) {}
        }
    }
    
    function saveColumnWidths() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(columnWidths));
    }
    
    function applyColumnWidths() {
        var ths = document.querySelectorAll('#tableHeader th');
        for (var i = 0; i < ths.length; i++) {
            var colName = ths[i].getAttribute('data-col');
            if (colName && columnWidths[colName]) {
                ths[i].style.width = columnWidths[colName] + 'px';
            } else {
                ths[i].style.width = '';
            }
        }
    }
    
    function initResize() {
        var ths = document.querySelectorAll('#tableHeader th');
        for (var i = 0; i < ths.length; i++) {
            var th = ths[i];
            if (th.querySelector('.resize-handle')) continue;
            var handle = document.createElement('div');
            handle.className = 'resize-handle';
            th.appendChild(handle);
            var colName = th.getAttribute('data-col');
            handle.addEventListener('mousedown', function(e) {
                var startX = e.clientX;
                var startWidth = th.offsetWidth;
                    function onMouseMove(me) {
                        var newWidth = startWidth + (me.clientX - startX);
                        if (newWidth >= 40) {
                            th.style.width = newWidth + 'px';
                            columnWidths[col] = newWidth;
                        }
                    }
                    function onMouseUp() {
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);
                        saveColumnWidths();
                    }
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
            });
        }
    }
    
    function showMsg(msg, isErr) {
        var toast = document.getElementById('toast');
        if (toast) {
            toast.textContent = msg;
            toast.style.background = isErr ? '#dc2626' : '#1e293b';
            toast.style.opacity = '1';
            setTimeout(function() { toast.style.opacity = '0'; }, 3000);
        } else {
            console.log(isErr ? '❌ ' : '✅ ', msg);
        }
    }
    
    function fetchWithTimeout(url, options, timeout) {
        return new Promise(function(resolve, reject) {
            var controller = new AbortController();
            var signal = controller.signal;
            var fetchPromise = fetch(url, Object.assign({}, options, { signal: signal }));
            var timer = setTimeout(function() {
                controller.abort();
                reject(new Error('请求超时（' + timeout + '秒）'));
            }, timeout * 1000);
            fetchPromise.then(function(res) {
                clearTimeout(timer);
                resolve(res);
            }).catch(function(err) {
                clearTimeout(timer);
                reject(err);
            });
        });
    }
    
    function loadData(showLoadingMsg) {
        var btn = document.getElementById('refreshBtn');
        if (showLoadingMsg !== false) {
            btn.textContent = '⏳ 加载中...';
            btn.disabled = true;
        }
        
        try {
            var api = window.electronAPI || (window.parent && window.parent.electronAPI);
            if (api && api.getInventoryData) {
                console.log('🔌 通过 Electron API 获取本地库存数据');
                api.getInventoryData().then(function(localData) {
                    if (localData && localData.rows) {
                        allData = localData.rows;
                        var updateTime = localData.updateTime || new Date().toLocaleString();
                        document.getElementById('lastUpdate').innerHTML = updateTime + ' (本地)';
                        document.getElementById('dataCount').innerHTML = allData.length;
                        localStorage.setItem('inventory_cache', JSON.stringify({ rows: allData, updateTime: updateTime }));
                        applyFilter();
                        showMsg('✅ 已从本地加载 ' + allData.length + ' 条数据');
                        if (showLoadingMsg !== false) {
                            btn.textContent = '🔄 刷新数据';
                            btn.disabled = false;
                        }
                    }
                }).catch(function(e) {
                    console.warn('Electron API 获取失败:', e);
                    loadFromEmbedded();
                });
                return;
            }
        } catch(e) {}
        
        loadFromEmbedded();
    }

    function loadFromEmbedded() {
        if (embeddedData && embeddedData.rows) {
            allData = embeddedData.rows;
            document.getElementById('lastUpdate').innerHTML = embeddedData.updateTime || new Date().toLocaleString();
            document.getElementById('dataCount').innerHTML = allData.length;
            localStorage.setItem('inventory_cache', JSON.stringify(embeddedData));
            applyFilter();
            showMsg('✅ 已加载内嵌数据，共 ' + allData.length + ' 条');
        }
        fetchLatestData();
    }

    function fetchLatestData() {
        var btn = document.getElementById('refreshBtn');
        var sources = [
            { url: './inventory.json', name: '本地文件', timeout: 5 },
            { url: '/inventory.json', name: '本地服务器', timeout: 5 },
            { url: DATA_URL + '?t=' + Date.now(), name: 'Gitee', timeout: 10 },
            { url: BACKUP_URL + '?t=' + Date.now(), name: 'GitHub', timeout: 15 }
        ];
        
        var currentIndex = 0;
        
        function tryNextSource() {
            if (currentIndex >= sources.length) {
                console.log('所有数据源都无法获取最新数据');
                if (btn) {
                    btn.textContent = '🔄 刷新数据';
                    btn.disabled = false;
                }
                return;
            }
            
            var source = sources[currentIndex++];
            fetchWithTimeout(source.url, {
                cache: 'no-cache',
                headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache' }
            }, source.timeout).then(function(response) {
                if (response.ok) {
                    return response.text();
                }
                throw new Error('HTTP ' + response.status);
            }).then(function(text) {
                try {
                    var firstBrace = text.indexOf('{');
                    var lastBrace = text.lastIndexOf('}');
                    if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
                        text = text.substring(firstBrace, lastBrace + 1);
                    }
                    var data = JSON.parse(text);
                    if (data.rows && data.updateTime) {
                        var cached = localStorage.getItem('inventory_cache');
                        var cacheUpdateTime = cached ? JSON.parse(cached).updateTime : '';
                        if (data.updateTime !== cacheUpdateTime) {
                            allData = data.rows;
                            document.getElementById('lastUpdate').innerHTML = data.updateTime;
                            document.getElementById('dataCount').innerHTML = allData.length;
                            localStorage.setItem('inventory_cache', JSON.stringify(data));
                            applyFilter();
                            showMsg('🔄 数据已更新至最新: ' + data.updateTime + ' (' + source.name + ')');
                        }
                    }
                } catch (parseErr) {
                    console.error('JSON解析失败:', parseErr);
                }
            }).catch(function(error) {
                console.log(source.name + '获取失败，尝试下一个:', error);
                tryNextSource();
            }).finally(function() {
                if (btn) {
                    btn.textContent = '🔄 刷新数据';
                    btn.disabled = false;
                }
            });
        }
        
        tryNextSource();
    }
    
    function applyFilter() {
        var search = document.getElementById('searchInput').value.toLowerCase();
        var month = document.getElementById('monthFilter').value;
        var data = allData.slice();
        if (search) {
            data = data.filter(function(r) {
                return (r['料号'] || '').toLowerCase().includes(search) || (r['品名'] || '').toLowerCase().includes(search);
            });
        }
        if (month !== 'all') {
            data = data.filter(function(r) {
                var m = (r['updateTime'] || '').match(/(\d{1,2})月/);
                return m && m[1] === month;
            });
        }
        if (sortColumn) {
            data.sort(function(a, b) {
                var av = a[sortColumn] || '', bv = b[sortColumn] || '';
                var an = parseFloat(av), bn = parseFloat(bv);
                if (!isNaN(an) && !isNaN(bn)) { av = an; bv = bn; }
                if (av < bv) return sortDirection === 'asc' ? -1 : 1;
                if (av > bv) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }
        filteredData = data;
        renderTable();
        applyColumnWidths();
        initResize();
    }
    
    function filterData() { applyFilter(); }
    function clearFilter() {
        document.getElementById('searchInput').value = '';
        document.getElementById('monthFilter').value = 'all';
        applyFilter();
    }
    
    function sortBy(col) {
        if (sortColumn === col) sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
        else { sortColumn = col; sortDirection = 'asc'; }
        applyFilter();
        updateSortIcons();
    }
    
    function updateSortIcons() {
        var headers = document.querySelectorAll('#tableHeader th');
        for (var i = 0; i < headers.length; i++) {
            var th = headers[i];
            var col = th.getAttribute('data-col');
            var icon = th.querySelector('.sort-icon');
            if (icon) {
                if (col === sortColumn) {
                    icon.textContent = sortDirection === 'asc' ? ' ↑' : ' ↓';
                    icon.classList.add('active');
                } else {
                    icon.textContent = ' ↕';
                    icon.classList.remove('active');
                }
            }
        }
    }
    
    function renderTable() {
        var thead = document.getElementById('tableHeader');
        var tbody = document.getElementById('tableBody');
        var headers = ['工厂', '仓位', '料号', '品名', '期初数量', '出货数量', '剩余数量', '出货明细', '备注'];
        var headerHtml = '<tr>';
        for (var i = 0; i < headers.length; i++) {
            var h = headers[i];
            headerHtml += '<th data-col="' + h + '" onclick="sortBy(\'' + h + '\')">' + h + '<span class="sort-icon"> ↕</span></th>';
        }
        headerHtml += '</tr>';
        thead.innerHTML = headerHtml;
        
        if (!filteredData.length) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center">暂无数据</td></tr>';
            return;
        }
        var rowsHtml = '';
        for (var idx = 0; idx < filteredData.length; idx++) {
            var row = filteredData[idx];
            var remaining = parseFloat(row['剩余数量'] || 0);
            var stockClass = remaining < 100 ? 'stock-low' : '';
            var details = [];
            try { details = row['出货明细'] ? (typeof row['出货明细'] === 'string' ? JSON.parse(row['出货明细']) : row['出货明细']) : []; } catch(e) {}
            var hasDetails = details.length > 0;
            var isExpanded = expandedRows.has(idx);
            rowsHtml += '<tr>';
            rowsHtml += '<td>' + escapeHtml(row['工厂'] || '-') + '</td>';
            rowsHtml += '<td>' + escapeHtml(row['仓位'] || '-') + '</td>';
            rowsHtml += '<td style="font-weight:500;">' + escapeHtml(row['料号'] || '-') + '</td>';
            rowsHtml += '<td>' + escapeHtml(row['品名'] || '-') + '</td>';
            rowsHtml += '<td>' + (row['期初数量'] || '0') + '</td>';
            rowsHtml += '<td>' + (row['出货数量'] || '0') + '</td>';
            rowsHtml += '<td class="' + stockClass + '">' + remaining + '</td>';
            rowsHtml += '<td>' + (hasDetails ? '<span class="expand-cell" onclick="toggleExpand(' + idx + ')">📋 明细 (' + details.length + ')</span>' : '-') + '</td>';
            rowsHtml += '<td>' + escapeHtml(row['备注'] || '-') + '</td>';
            rowsHtml += '</tr>';
            if (isExpanded && hasDetails) {
                rowsHtml += '<tr class="detail-row"><td colspan="9" style="padding:8px;background:#f8fafc;"><div style="overflow-x:auto;"><table class="detail-table"><thead><tr><th>日期</th><th>扣减数量</th><th>操作人</th><th>项目编号</th><th>备注</th></tr></thead><tbody>';
                for (var d = 0; d < details.length; d++) {
                    rowsHtml += '<tr>';
                    rowsHtml += '<td>' + escapeHtml(details[d]['日期'] || '-') + '</td>';
                    rowsHtml += '<td>' + escapeHtml(details[d]['扣减数量'] || '-') + '</td>';
                    rowsHtml += '<td>' + escapeHtml(details[d]['操作人'] || '-') + '</td>';
                    rowsHtml += '<td>' + escapeHtml(details[d]['项目编号'] || '-') + '</td>';
                    rowsHtml += '<td>' + escapeHtml(details[d]['备注'] || '-') + '</td>';
                    rowsHtml += '</tr>';
                }
                rowsHtml += '</tbody></table></div></td></tr>';
            }
        }
        tbody.innerHTML = rowsHtml;
        updateSortIcons();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function toggleExpand(idx) {
        if (expandedRows.has(idx)) expandedRows.delete(idx);
        else expandedRows.add(idx);
        renderTable();
        applyColumnWidths();
        initResize();
    }
    
    loadColumnWidths();
    document.getElementById('refreshBtn').addEventListener('click', function() { loadData(true); });
    document.getElementById('clearFilterBtn').addEventListener('click', clearFilter);
    
    loadData(false);
